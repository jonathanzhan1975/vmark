name: Update Homebrew Tap

on:
  # Triggered by release.yml via gh workflow run — not by release event directly
  # to avoid racing with asset uploads
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.0)'
        required: true

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERSION: ${{ github.event.inputs.version }}
      REPO: xiaolai/vmark
    steps:
      - name: Validate version input
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version input must look like 'X.Y.Z' (got '$VERSION')"
            exit 1
          fi

      - name: Checkout homebrew-tap (early, for regression guard)
        uses: actions/checkout@v6
        with:
          repository: xiaolai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Guard against tap regression
        run: |
          # Refuse to publish a Homebrew cask that's older than (or equal to)
          # what the tap already has. Without this, a misfired workflow_dispatch
          # with the wrong version would push every `brew upgrade` user
          # backwards.
          CURRENT=$(grep '^  version "' homebrew-tap/Casks/vmark.rb 2>/dev/null \
            | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CURRENT" ]; then
            echo "No existing cask version found — first publish, proceeding."
            exit 0
          fi
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "::error::Tap already at $CURRENT — refusing to re-publish."
            exit 1
          fi
          HIGHER=$(printf '%s\n%s' "$VERSION" "$CURRENT" | sort -V | tail -1)
          if [ "$HIGHER" != "$VERSION" ]; then
            echo "::error::Refusing to downgrade tap from $CURRENT to $VERSION"
            exit 1
          fi
          echo "✅ $VERSION > $CURRENT — proceeding"

      - name: Wait for DMGs to be available
        run: |
          ARM_URL="https://github.com/${REPO}/releases/download/v${VERSION}/VMark_${VERSION}_aarch64.dmg"
          INTEL_URL="https://github.com/${REPO}/releases/download/v${VERSION}/VMark_${VERSION}_x64.dmg"

          echo "Waiting for DMGs..."
          echo "ARM: $ARM_URL"
          echo "Intel: $INTEL_URL"

          # curl -L follows redirects; -w "%{http_code}" reports the FINAL
          # code. Match only 200 — the previous "302|200" regex was dead
          # code (with -L, 302 never reaches the output) and misled readers
          # into thinking we accepted unfollowed redirects.
          for i in {1..30}; do
            ARM_CODE=$(curl -sI -o /dev/null -w "%{http_code}" -L "$ARM_URL")
            INTEL_CODE=$(curl -sI -o /dev/null -w "%{http_code}" -L "$INTEL_URL")

            if [ "$ARM_CODE" = "200" ] && [ "$INTEL_CODE" = "200" ]; then
              echo "Both DMGs are available!"
              exit 0
            fi
            echo "Attempt $i/30: Waiting... (ARM: $ARM_CODE, Intel: $INTEL_CODE)"
            sleep 30
          done

          echo "DMGs not available after 15 minutes"
          exit 1

      - name: Download DMGs and calculate SHA256
        id: sha256
        run: |
          ARM_URL="https://github.com/${REPO}/releases/download/v${VERSION}/VMark_${VERSION}_aarch64.dmg"
          INTEL_URL="https://github.com/${REPO}/releases/download/v${VERSION}/VMark_${VERSION}_x64.dmg"

          echo "Downloading ARM DMG..."
          curl -L -o vmark-arm.dmg "$ARM_URL"
          SHA256_ARM=$(sha256sum vmark-arm.dmg | cut -d ' ' -f 1)
          echo "SHA256 (ARM): $SHA256_ARM"
          echo "sha256_arm=$SHA256_ARM" >> "$GITHUB_OUTPUT"
          rm vmark-arm.dmg

          echo "Downloading Intel DMG..."
          curl -L -o vmark-intel.dmg "$INTEL_URL"
          SHA256_INTEL=$(sha256sum vmark-intel.dmg | cut -d ' ' -f 1)
          echo "SHA256 (Intel): $SHA256_INTEL"
          echo "sha256_intel=$SHA256_INTEL" >> "$GITHUB_OUTPUT"
          rm vmark-intel.dmg

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: xiaolai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate cask formula
        env:
          SHA256_ARM: ${{ steps.sha256.outputs.sha256_arm }}
          SHA256_INTEL: ${{ steps.sha256.outputs.sha256_intel }}
        run: |
          cat > homebrew-tap/Casks/vmark.rb << RUBY
          cask "vmark" do
            version "${VERSION}"

            on_arm do
              sha256 "${SHA256_ARM}"
              url "https://github.com/${REPO}/releases/download/v#{version}/VMark_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "${SHA256_INTEL}"
              url "https://github.com/${REPO}/releases/download/v#{version}/VMark_#{version}_x64.dmg"
            end

            name "VMark"
            desc "Modern Markdown editor with WYSIWYG and source mode"
            homepage "https://github.com/${REPO}"

            livecheck do
              url :homepage
              strategy :github_latest
            end

            depends_on macos: ">= :catalina"

            app "VMark.app"

            zap trash: [
              "~/Library/Application Support/app.vmark",
              "~/Library/Caches/app.vmark",
              "~/Library/Preferences/app.vmark.plist",
              "~/Library/Saved Application State/app.vmark.savedState",
            ]
          end
          RUBY

          echo "Generated cask formula:"
          cat homebrew-tap/Casks/vmark.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/vmark.rb
          git commit -m "Update vmark to ${VERSION}"
          git push
